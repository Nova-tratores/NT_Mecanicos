<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Limpando app...</title>
<style>
  body { font-family: system-ui; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #111; color: #fff; text-align: center; }
  .box { padding: 32px; }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #C41E2A; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 20px; margin: 0 0 8px; }
  p { font-size: 14px; color: #999; margin: 0 0 20px; }
  #status { font-size: 13px; color: #C41E2A; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h2>Atualizando app...</h2>
  <p>Isso leva poucos segundos</p>
  <div id="status">Limpando cache...</div>
</div>
<script>
(async function() {
  var s = document.getElementById('status');
  try {
    // 1. Desregistrar todos os Service Workers
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      for (var r of regs) { await r.unregister(); }
      s.textContent = 'Service Workers removidos (' + regs.length + ')';
    }
    // 2. Limpar todos os caches
    if ('caches' in window) {
      var keys = await caches.keys();
      for (var k of keys) { await caches.delete(k); }
      s.textContent = 'Caches limpos (' + keys.length + ')';
    }
    // 3. Limpar localStorage
    try { localStorage.clear(); } catch(e) {}

    s.textContent = 'Pronto! Redirecionando...';
    // 4. Redirecionar para o app
    setTimeout(function() { window.location.href = '/?t=' + Date.now(); }, 1000);
  } catch(e) {
    s.textContent = 'Erro: ' + e.message + '. Tente limpar dados do site manualmente.';
  }
})();
</script>
</body>
</html>
